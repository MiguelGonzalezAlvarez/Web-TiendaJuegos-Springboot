<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#1f2937',
                        darker: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-darker border-b border-gray-800">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a th:href="@{/}" class="flex items-center space-x-2">
                    <div class="w-10 h-10 hero-gradient rounded-lg flex items-center justify-center">
                        <i class="fas fa-gamepad text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white">Game<span class="text-primary">Hub</span></span>
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-white mb-8">Checkout</h1>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Form -->
            <div class="lg:w-2/3">
                <form class="space-y-6">
                    <!-- Shipping Info -->
                    <div class="bg-gray-800 rounded-xl p-6">
                        <h2 class="text-xl font-bold text-white mb-6">
                            <i class="fas fa-shipping-fast mr-2 text-primary"></i>
                            Información de envío
                        </h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-300 mb-2">Nombre</label>
                                <input type="text" placeholder="Juan" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Apellido</label>
                                <input type="text" placeholder="Pérez" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-gray-300 mb-2">Dirección</label>
                                <input type="text" placeholder="Calle Principal 123" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Ciudad</label>
                                <input type="text" placeholder="Madrid" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Código postal</label>
                                <input type="text" placeholder="28001" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Teléfono</label>
                                <input type="tel" placeholder="+34 600 000 000" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                        </div>
                    </div>

                    <!-- Payment -->
                    <div class="bg-gray-800 rounded-xl p-6">
                        <h2 class="text-xl font-bold text-white mb-6">
                            <i class="fas fa-credit-card mr-2 text-primary"></i>
                            Pago
                        </h2>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-300 mb-2">Número de tarjeta</label>
                                <div class="relative">
                                    <input type="text" placeholder="1234 5678 9012 3456" 
                                        class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none pl-12">
                                    <i class="fas fa-credit-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-gray-300 mb-2">Fecha de expiración</label>
                                    <input type="text" placeholder="MM/YY" 
                                        class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                                </div>
                                <div>
                                    <label class="block text-gray-300 mb-2">CVC</label>
                                    <input type="text" placeholder="123" 
                                        class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-gray-300 mb-2">Nombre en la tarjeta</label>
                                <input type="text" placeholder="JUAN PÉREZ" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                        </div>
                        
                        <div class="mt-4 flex items-center gap-2 text-gray-400 text-sm">
                            <i class="fas fa-lock text-green-500"></i>
                            <span>Tu pago está seguro con encriptación SSL</span>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="lg:w-1/3">
                <div class="bg-gray-800 rounded-xl p-6 sticky top-24">
                    <h2 class="text-xl font-bold text-white mb-6">Resumen del pedido</h2>
                    
                    <!-- Items -->
                    <div class="space-y-4 mb-6">
                        <div class="flex gap-4">
                            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=60&h=40&fit=crop" class="w-16 h-10 object-cover rounded">
                            <div class="flex-1">
                                <h3 class="text-white text-sm">Cyber Odyssey 2077</h3>
                                <p class="text-gray-500 text-xs">1 × $49.99</p>
                            </div>
                            <span class="text-white text-sm">$49.99</span>
                        </div>
                        <div class="flex gap-4">
                            <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b2b0f?w=60&h=40&fit=crop" class="w-16 h-10 object-cover rounded">
                            <div class="flex-1">
                                <h3 class="text-white text-sm">Fantasy Realms</h3>
                                <p class="text-gray-500 text-xs">2 × $41.99</p>
                            </div>
                            <span class="text-white text-sm">$83.98</span>
                        </div>
                        <div class="flex gap-4">
                            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=60&h=40&fit=crop" class="w-16 h-10 object-cover rounded">
                            <div class="flex-1">
                                <h3 class="text-white text-sm">Speed Demons</h3>
                                <p class="text-gray-500 text-xs">1 × $39.99</p>
                            </div>
                            <span class="text-white text-sm">$39.99</span>
                        </div>
                    </div>

                    <hr class="border-gray-700 mb-4">

                    <div class="space-y-2">
                        <div class="flex justify-between text-gray-300">
                            <span>Subtotal</span>
                            <span>$173.96</span>
                        </div>
                        <div class="flex justify-between text-gray-300">
                            <span>Descuento</span>
                            <span class="text-green-500">-$17.99</span>
                        </div>
                        <div class="flex justify-between text-gray-300">
                            <span>Envío</span>
                            <span class="text-green-500">Gratis</span>
                        </div>
                        <hr class="border-gray-700 my-2">
                        <div class="flex justify-between text-xl font-bold text-white">
                            <span>Total</span>
                            <span>$155.97</span>
                        </div>
                    </div>

                    <button class="w-full bg-primary hover:bg-indigo-600 text-white text-center px-6 py-3 rounded-lg font-semibold transition-colors mt-6">
                        <i class="fas fa-lock mr-2"></i>
                        Realizar pedido
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-darker border-t border-gray-800">
        <div class="container mx-auto px-4 py-8 text-center text-gray-500">
            <p>&copy; 2026 GameHub.</p>
        </div>
    </footer>
</body>
</html>
