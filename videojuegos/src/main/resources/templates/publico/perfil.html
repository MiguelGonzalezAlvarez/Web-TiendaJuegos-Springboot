<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#1f2937',
                        darker: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-darker border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a th:href="@{/}" class="flex items-center space-x-2">
                    <div class="w-10 h-10 hero-gradient rounded-lg flex items-center justify-center">
                        <i class="fas fa-gamepad text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white">Game<span class="text-primary">Hub</span></span>
                </a>
                <div class="flex items-center space-x-4">
                    <a th:href="@{/carrito}" class="relative p-2 text-gray-300 hover:text-primary">
                        <i class="fas fa-shopping-cart text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex-1 container mx-auto px-4 py-8">
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar -->
            <aside class="lg:w-1/4">
                <div class="bg-gray-800 rounded-xl p-6">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 mx-auto bg-primary rounded-full flex items-center justify-center text-3xl font-bold text-white mb-3">
                            JP
                        </div>
                        <h2 class="text-xl font-bold text-white">Juan Pérez</h2>
                        <p class="text-gray-400">juan@email.com</p>
                    </div>
                    <nav class="space-y-2">
                        <a th:href="@{/perfil}" class="flex items-center gap-3 px-4 py-2 bg-primary text-white rounded-lg">
                            <i class="fas fa-user"></i>
                            Mi perfil
                        </a>
                        <a th:href="@{/pedidos}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="fas fa-box"></i>
                            Mis pedidos
                        </a>
                        <a th:href="@{/wishlist}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="fas fa-heart"></i>
                            Wishlist
                        </a>
                        <a href="#" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="fas fa-cog"></i>
                            Configuración
                        </a>
                        <a th:href="@{/}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg transition-colors">
                            <i class="fas fa-sign-out-alt"></i>
                            Cerrar sesión
                        </a>
                    </nav>
                </div>
            </aside>

            <!-- Content -->
            <div class="lg:w-3/4">
                <h1 class="text-2xl font-bold text-white mb-6">Mi perfil</h1>

                <!-- Profile Form -->
                <div class="bg-gray-800 rounded-xl p-6 mb-6">
                    <h2 class="text-xl font-semibold text-white mb-6">Información personal</h2>
                    <form class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-300 mb-2">Nombre</label>
                                <input type="text" value="Juan" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Apellido</label>
                                <input type="text" value="Pérez" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Email</label>
                                <input type="email" value="juan@email.com" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-2">Teléfono</label>
                                <input type="tel" value="+34 600 000 000" 
                                    class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            </div>
                        </div>
                        <button type="submit" class="bg-primary hover:bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                            Guardar cambios
                        </button>
                    </form>
                </div>

                <!-- Change Password -->
                <div class="bg-gray-800 rounded-xl p-6">
                    <h2 class="text-xl font-semibold text-white mb-6">Cambiar contraseña</h2>
                    <form class="space-y-4">
                        <div>
                            <label class="block text-gray-300 mb-2">Contraseña actual</label>
                            <input type="password" placeholder="••••••••" 
                                class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-300 mb-2">Nueva contraseña</label>
                            <input type="password" placeholder="••••••••" 
                                class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-300 mb-2">Confirmar contraseña</label>
                            <input type="password" placeholder="••••••••" 
                                class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                        </div>
                        <button type="submit" class="bg-primary hover:bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                            Actualizar contraseña
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-darker border-t border-gray-800">
        <div class="container mx-auto px-4 py-8 text-center text-gray-500">
            <p>&copy; 2026 GameHub.</p>
        </div>
    </footer>
</body>
</html>
