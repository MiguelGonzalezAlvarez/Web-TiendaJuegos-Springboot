<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#1f2937',
                        darker: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a th:href="@{/}" class="inline-flex items-center space-x-2">
                <div class="w-12 h-12 hero-gradient rounded-lg flex items-center justify-center">
                    <i class="fas fa-gamepad text-white text-2xl"></i>
                </div>
                <span class="text-2xl font-bold text-white">Game<span class="text-primary">Hub</span></span>
            </a>
        </div>

        <!-- Form -->
        <div class="bg-gray-800 rounded-2xl p-8">
            <h1 class="text-2xl font-bold text-white text-center mb-6">Iniciar sesión</h1>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-gray-300 mb-2">Email</label>
                    <input type="email" placeholder="tu@email.com" 
                        class="w-full bg-gray-700 text-gray-100 px-4 py-3 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-gray-300 mb-2">Contraseña</label>
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-gray-700 text-gray-100 px-4 py-3 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center text-gray-400 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-600 text-primary bg-gray-700">
                        <span class="ml-2 text-sm">Recordarme</span>
                    </label>
                    <a href="#" class="text-primary text-sm hover:underline">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-indigo-600 text-white font-semibold py-3 rounded-lg transition-colors">
                    Iniciar sesión
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-gray-800 text-gray-500">O continúa con</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-lg transition-colors">
                    <i class="fab fa-google mr-2"></i>
                    Google
                </button>
                <button class="flex items-center justify-center bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-lg transition-colors">
                    <i class="fab fa-github mr-2"></i>
                    GitHub
                </button>
            </div>
        </div>

        <p class="text-center text-gray-400 mt-6">
            ¿No tienes cuenta? 
            <a th:href="@{/registro}" class="text-primary hover:underline">Regístrate</a>
        </p>
    </div>
</body>
</html>
