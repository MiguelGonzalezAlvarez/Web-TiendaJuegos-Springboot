<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pedidos - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#1f2937',
                        darker: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-darker border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a th:href="@{/}" class="flex items-center space-x-2">
                    <div class="w-10 h-10 hero-gradient rounded-lg flex items-center justify-center">
                        <i class="fas fa-gamepad text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white">Game<span class="text-primary">Hub</span> <span class="text-gray-500 text-sm">Admin</span></span>
                </a>
            </div>
        </div>
    </header>

    <div class="flex-1 flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 p-4 hidden md:block">
            <nav class="space-y-2">
                <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a th:href="@{/admin/productos}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-gamepad"></i> Productos
                </a>
                <a th:href="@{/admin/pedidos}" class="flex items-center gap-3 px-4 py-2 bg-primary text-white rounded-lg">
                    <i class="fas fa-box"></i> Pedidos
                </a>
                <a th:href="@{/admin/importar}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-download"></i> Importar RAWG
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <h1 class="text-2xl font-bold text-white mb-6">Pedidos</h1>

            <!-- Filters -->
            <div class="flex flex-wrap gap-4 mb-6">
                <select class="bg-gray-800 text-gray-300 px-4 py-2 rounded-lg border border-gray-700">
                    <option>Todos los estados</option>
                    <option>Pendiente</option>
                    <option>Procesando</option>
                    <option>Enviado</option>
                    <option>Completado</option>
                    <option>Cancelado</option>
                </select>
                <input type="date" class="bg-gray-800 text-gray-300 px-4 py-2 rounded-lg border border-gray-700">
            </div>

            <!-- Table -->
            <div class="bg-gray-800 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-700">
                        <tr>
                            <th class="p-4 text-gray-400 font-semibold">ID</th>
                            <th class="p-4 text-gray-400 font-semibold">Cliente</th>
                            <th class="p-4 text-gray-400 font-semibold">Fecha</th>
                            <th class="p-4 text-gray-400 font-semibold">Total</th>
                            <th class="p-4 text-gray-400 font-semibold">Estado</th>
                            <th class="p-4 text-gray-400 font-semibold">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4 text-white font-mono">#GH-001</td>
                            <td class="p-4 text-gray-300">Juan Pérez</td>
                            <td class="p-4 text-gray-300">26 Feb 2026</td>
                            <td class="p-4 text-white">$155.97</td>
                            <td class="p-4">
                                <select class="bg-green-500/20 text-green-500 px-2 py-1 rounded text-sm border-none cursor-pointer">
                                    <option>Completado</option>
                                    <option>Enviado</option>
                                    <option>Procesando</option>
                                    <option>Cancelado</option>
                                </select>
                            </td>
                            <td class="p-4">
                                <button class="text-gray-400 hover:text-primary"><i class="fas fa-eye"></i></button>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4 text-white font-mono">#GH-002</td>
                            <td class="p-4 text-gray-300">María García</td>
                            <td class="p-4 text-gray-300">26 Feb 2026</td>
                            <td class="p-4 text-white">$89.99</td>
                            <td class="p-4">
                                <select class="bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded text-sm border-none cursor-pointer">
                                    <option>Pendiente</option>
                                    <option>Procesando</option>
                                    <option>Enviado</option>
                                    <option>Completado</option>
                                </select>
                            </td>
                            <td class="p-4">
                                <button class="text-gray-400 hover:text-primary"><i class="fas fa-eye"></i></button>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4 text-white font-mono">#GH-003</td>
                            <td class="p-4 text-gray-300">Carlos López</td>
                            <td class="p-4 text-gray-300">25 Feb 2026</td>
                            <td class="p-4 text-white">$249.99</td>
                            <td class="p-4">
                                <select class="bg-blue-500/20 text-blue-500 px-2 py-1 rounded text-sm border-none cursor-pointer">
                                    <option>Enviado</option>
                                    <option>Completado</option>
                                    <option>Cancelado</option>
                                </select>
                            </td>
                            <td class="p-4">
                                <button class="text-gray-400 hover:text-primary"><i class="fas fa-eye"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td class="p-4 text-white font-mono">#GH-004</td>
                            <td class="p-4 text-gray-300">Ana Martínez</td>
                            <td class="p-4 text-gray-300">25 Feb 2026</td>
                            <td class="p-4 text-white">$59.99</td>
                            <td class="p-4">
                                <select class="bg-green-500/20 text-green-500 px-2 py-1 rounded text-sm border-none cursor-pointer">
                                    <option>Completado</option>
                                </select>
                            </td>
                            <td class="p-4">
                                <button class="text-gray-400 hover:text-primary"><i class="fas fa-eye"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="mt-4 flex justify-center">
                <nav class="flex items-center gap-2">
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700"><i class="fas fa-chevron-left"></i></a>
                    <a href="#" class="px-3 py-1 bg-primary text-white rounded">1</a>
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700">2</a>
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700"><i class="fas fa-chevron-right"></i></a>
                </nav>
            </div>
        </main>
    </div>
</body>
</html>
