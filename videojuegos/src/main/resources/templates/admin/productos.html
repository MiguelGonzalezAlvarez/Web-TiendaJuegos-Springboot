<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Productos - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#1f2937',
                        darker: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-darker border-b border-gray-800 sticky top-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a th:href="@{/}" class="flex items-center space-x-2">
                    <div class="w-10 h-10 hero-gradient rounded-lg flex items-center justify-center">
                        <i class="fas fa-gamepad text-white text-xl"></i>
                    </div>
                    <span class="text-xl font-bold text-white">Game<span class="text-primary">Hub</span> <span class="text-gray-500 text-sm">Admin</span></span>
                </a>
            </div>
        </div>
    </header>

    <div class="flex-1 flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-800 p-4 hidden md:block">
            <nav class="space-y-2">
                <a th:href="@{/admin}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a th:href="@{/admin/productos}" class="flex items-center gap-3 px-4 py-2 bg-primary text-white rounded-lg">
                    <i class="fas fa-gamepad"></i> Productos
                </a>
                <a th:href="@{/admin/pedidos}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-box"></i> Pedidos
                </a>
                <a th:href="@{/admin/importar}" class="flex items-center gap-3 px-4 py-2 text-gray-300 hover:bg-gray-700 rounded-lg">
                    <i class="fas fa-download"></i> Importar RAWG
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold text-white">Productos</h1>
                <button onclick="document.getElementById('productModal').classList.remove('hidden')" class="bg-primary hover:bg-indigo-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-plus mr-2"></i> Nuevo producto
                </button>
            </div>

            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="flex-1 relative">
                    <input type="text" placeholder="Buscar productos..." 
                        class="w-full bg-gray-800 text-gray-100 px-4 py-2 pl-10 rounded-lg border border-gray-700 focus:border-primary focus:outline-none">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                </div>
                <select class="bg-gray-800 text-gray-300 px-4 py-2 rounded-lg border border-gray-700">
                    <option>Todos los géneros</option>
                    <option>Acción</option>
                    <option>RPG</option>
                    <option>Estrategia</option>
                </select>
            </div>

            <!-- Table -->
            <div class="bg-gray-800 rounded-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-700">
                        <tr>
                            <th class="p-4 text-gray-400 font-semibold">Producto</th>
                            <th class="p-4 text-gray-400 font-semibold">Género</th>
                            <th class="p-4 text-gray-400 font-semibold">Precio</th>
                            <th class="p-4 text-gray-400 font-semibold">Stock</th>
                            <th class="p-4 text-gray-400 font-semibold">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=50&h=30&fit=crop" class="w-12 h-8 object-cover rounded">
                                    <span class="text-white">Cyber Odyssey 2077</span>
                                </div>
                            </td>
                            <td class="p-4 text-gray-300">Acción</td>
                            <td class="p-4 text-white">$49.99</td>
                            <td class="p-4"><span class="text-green-500">En stock</span></td>
                            <td class="p-4">
                                <div class="flex gap-2">
                                    <button class="text-gray-400 hover:text-primary"><i class="fas fa-edit"></i></button>
                                    <button class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-700/50">
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b2b0f?w=50&h=30&fit=crop" class="w-12 h-8 object-cover rounded">
                                    <span class="text-white">Fantasy Realms</span>
                                </div>
                            </td>
                            <td class="p-4 text-gray-300">RPG</td>
                            <td class="p-4 text-white">$59.99</td>
                            <td class="p-4"><span class="text-green-500">En stock</span></td>
                            <td class="p-4">
                                <div class="flex gap-2">
                                    <button class="text-gray-400 hover:text-primary"><i class="fas fa-edit"></i></button>
                                    <button class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td class="p-4">
                                <div class="flex items-center gap-3">
                                    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=50&h=30&fit=crop" class="w-12 h-8 object-cover rounded">
                                    <span class="text-white">Speed Demons</span>
                                </div>
                            </td>
                            <td class="p-4 text-gray-300">Carreras</td>
                            <td class="p-4 text-white">$39.99</td>
                            <td class="p-4"><span class="text-yellow-500">Bajo stock</span></td>
                            <td class="p-4">
                                <div class="flex gap-2">
                                    <button class="text-gray-400 hover:text-primary"><i class="fas fa-edit"></i></button>
                                    <button class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="mt-4 flex justify-center">
                <nav class="flex items-center gap-2">
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700"><i class="fas fa-chevron-left"></i></a>
                    <a href="#" class="px-3 py-1 bg-primary text-white rounded">1</a>
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700">2</a>
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700">3</a>
                    <a href="#" class="px-3 py-1 bg-gray-800 text-gray-400 rounded hover:bg-gray-700"><i class="fas fa-chevron-right"></i></a>
                </nav>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="productModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="bg-gray-800 rounded-xl p-6 w-full max-w-lg">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold text-white">Nuevo producto</h2>
                <button onclick="document.getElementById('productModal').classList.add('hidden')" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="block text-gray-300 mb-2">Nombre</label>
                    <input type="text" class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-gray-300 mb-2">Precio</label>
                        <input type="number" step="0.01" class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-300 mb-2">Género</label>
                        <select class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none">
                            <option>Acción</option>
                            <option>RPG</option>
                            <option>Estrategia</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-300 mb-2">Descripción</label>
                    <textarea rows="3" class="w-full bg-gray-700 text-gray-100 px-4 py-2 rounded-lg border border-gray-600 focus:border-primary focus:outline-none"></textarea>
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="document.getElementById('productModal').classList.add('hidden')" class="px-4 py-2 text-gray-300 hover:text-white">Cancelar</button>
                    <button type="submit" class="bg-primary hover:bg-indigo-600 text-white px-4 py-2 rounded-lg">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
