spring:
  application:
    name: gamehub
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:h2:mem:gamehub;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  flyway:
    enabled: false
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  
  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

application:
  security:
    jwt:
      secret-key: gamehub-secret-key-must-be-at-least-256-bits-long-for-hs256
      expiration: 900000
      refresh-expiration: 604800000
  
  stripe:
    public-key: ${STRIPE_PUBLIC_KEY:pk_test_placeholder}
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  
  rawg:
    api-key: ${RAWG_API_KEY:}
    base-url: https://api.rawg.io/api
  
  mail:
    from: ${MAIL_FROM:noreply@gamehub.com}
  
  frontend:
    url: ${FRONTEND_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.gamehub: DEBUG

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:8080,http://localhost:3000}
